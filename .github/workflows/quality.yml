name: Quality

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reviewed_head_sha:
        description: "Exact reviewed PR head SHA required for premerge full evidence"
        required: true
        type: string

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install governance dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check changed-file whitespace
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
        if: github.event_name == 'pull_request'

      - name: Check repository whitespace
        run: git diff --check HEAD^ HEAD
        if: github.event_name == 'push'

      - name: Run static checks
        run: |
          python -m compileall -q src scripts tests
          ruff format --check src scripts tests
          ruff check src scripts tests

      - name: Validate document derivation
        run: python scripts/build_compendium.py --check

      - name: Validate canonical text contract
        run: python scripts/validate_text_contract.py

      - name: Validate manifest contracts
        run: python scripts/validate_manifests.py

      - name: Validate governance configurations
        run: python scripts/validate_configs.py

      - name: Run unit fast tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile unit-fast --slowest-files 10

      - name: Run stage R2 tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile stage-r2 --slowest-files 10

      - name: Run PR fast tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile pr-fast --slowest-files 10

      - name: Run regression lite tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile regression-lite --slowest-files 10

      - name: Run full tests
        if: github.event_name != 'pull_request'
        run: python scripts/run_unittest_profile.py --profile full --slowest-files 10

  canonical-text-cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Validate text and formal source bindings
        run: |
          python scripts/validate_text_contract.py
          python -m unittest tests.test_canonical_text_contract tests.r2.test_r2_t02_protocol_freeze

  premerge-full:
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.reviewed_head_sha || github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Run full profile on reviewed head
        run: |
          python scripts/run_unittest_profile.py \
            --profile full \
            --slowest-files 10 \
            --json-output artifacts/r2_t02_premerge/full_profile_result.json

      - name: Build R2-T02 premerge full evidence
        env:
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || 0 }}
        run: |
          python scripts/r2/build_r2_t02_premerge_full_evidence.py \
            --profile-result artifacts/r2_t02_premerge/full_profile_result.json \
            --output artifacts/r2_t02_premerge/r2_t02_premerge_full_evidence.json \
            --reviewed-head-sha "${{ github.event_name == 'workflow_dispatch' && inputs.reviewed_head_sha || github.event.pull_request.head.sha }}" \
            --author-package data/generated/r2/r2_t02/R2-T02-20260712T1200Z/r2_t02_result_package.json \
            --committed-artifact-sidecar data/generated/r2/r2_t02/R2-T02-20260712T1200Z/r2_t02_committed_artifact_validation.json \
            --author-stage-review-record data/generated/r2/r2_t02/R2-T02-20260712T1200Z/r2_t02_author_stage_scientific_review.json \
            --scientific-review-record data/generated/r2/r2_t02/R2-T02-20260712T1200Z/r2_t02_post_author_scientific_review.json

      - name: Consume R2-T02 premerge full evidence final gate
        run: |
          python scripts/r2/build_r2_t02_premerge_full_evidence.py \
            --final-gate-validate artifacts/r2_t02_premerge/r2_t02_premerge_full_evidence.json \
            --reviewed-head-sha "${{ github.event_name == 'workflow_dispatch' && inputs.reviewed_head_sha || github.event.pull_request.head.sha }}" \
            --expected-repository "${{ github.repository }}" \
            --expected-pr-number "${{ github.event_name == 'pull_request' && github.event.pull_request.number || 0 }}" \
            --expected-workflow "${{ github.workflow }}"

      - name: Upload R2-T02 premerge full evidence
        uses: actions/upload-artifact@v4
        with:
          name: r2-t02-premerge-full-evidence
          path: artifacts/r2_t02_premerge/
