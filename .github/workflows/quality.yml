name: Quality

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install governance dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check changed-file whitespace
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
        if: github.event_name == 'pull_request'

      - name: Check repository whitespace
        run: git diff --check HEAD^ HEAD
        if: github.event_name == 'push'

      - name: Run static checks
        run: |
          python -m compileall -q src scripts tests
          ruff format --check src scripts tests
          ruff check src scripts tests

      - name: Validate document derivation
        run: python scripts/build_compendium.py --check

      - name: Validate manifest contracts
        run: python scripts/validate_manifests.py

      - name: Validate governance configurations
        run: python scripts/validate_configs.py

      - name: Run unit fast tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile unit-fast -v

      - name: Run stage R2 tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile stage-r2 -v

      - name: Run PR fast tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile pr-fast -v

      - name: Run routine regression tests
        if: github.event_name == 'pull_request'
        run: python scripts/run_unittest_profile.py --profile regression-lite -v

      - name: Run premerge full tests
        if: github.event_name == 'workflow_dispatch' || github.event.action == 'ready_for_review' || (github.event.action == 'synchronize' && github.event.pull_request.draft == false)
        run: python scripts/run_unittest_profile.py --profile full -v --result-json "${{ runner.temp }}/full-result.json"

      - name: Build R2-T02 premerge full evidence
        if: github.event_name == 'workflow_dispatch' || github.event.action == 'ready_for_review' || (github.event.action == 'synchronize' && github.event.pull_request.draft == false)
        run: python scripts/r2/build_r2_t02_premerge_full_evidence.py --runner-result "${{ runner.temp }}/full-result.json" --output "${{ runner.temp }}/r2_t02_premerge_full_evidence.json" --tested-head "${{ github.sha }}" --workflow-run-id "${{ github.run_id }}" --workflow-run-attempt "${{ github.run_attempt }}"

      - name: Upload R2-T02 premerge full evidence
        if: github.event_name == 'workflow_dispatch' || github.event.action == 'ready_for_review' || (github.event.action == 'synchronize' && github.event.pull_request.draft == false)
        uses: actions/upload-artifact@v4
        with:
          name: r2-t02-premerge-full-evidence
          path: ${{ runner.temp }}/r2_t02_premerge_full_evidence.json
