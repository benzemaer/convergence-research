name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  basic-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --requirement requirements-dev.txt
          python -m pip install pytz==2026.2

      - name: Run basic quality checks
        run: |
          python -m compileall -q src scripts tests
          python -m ruff format --check src scripts tests
          python -m ruff check src scripts tests
          python scripts/validate_configs.py
          python scripts/validate_manifests.py
          python scripts/validate_local_storage_policy.py
          python scripts/validate_text_contract.py
          python scripts/build_compendium.py --check
          python -m pytest tests/r2a -q

      - name: Check pull request diff whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"

      - name: Check main push diff whitespace
        if: github.event_name == 'push'
        run: git diff --check HEAD^ HEAD
