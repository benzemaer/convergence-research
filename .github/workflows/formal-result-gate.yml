name: Formal Result Gate

on:
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: "Open formal-result pull request number"
        required: true
        type: number
      submission_manifest_path:
        description: "Repository-relative task submission manifest path"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  formal-result-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Read pull request metadata and reviews
        id: pull-request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
          GATE_TMP: ${{ runner.temp }}/formal_result_gate
        run: |
          set -euo pipefail
          mkdir -p "$GATE_TMP"
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            > "$GATE_TMP/pull_request.json"
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            | jq 'add' > "$GATE_TMP/github_reviews.json"
          jq -e --arg label "formal-result" \
            '.labels | map(.name) | index($label) != null' \
            "$GATE_TMP/pull_request.json" > /dev/null
          test "$(jq -r .state "$GATE_TMP/pull_request.json")" = "open"
          test "$(jq -r .base.repo.full_name "$GATE_TMP/pull_request.json")" = "$GITHUB_REPOSITORY"
          echo "head_sha=$(jq -r .head.sha "$GATE_TMP/pull_request.json")" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(jq -r .base.sha "$GATE_TMP/pull_request.json")" >> "$GITHUB_OUTPUT"

      - name: Check out the current pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ steps.pull-request.outputs.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Materialize GitHub metadata evidence
        run: |
          mkdir -p artifacts/formal_result_gate
          cp "$RUNNER_TEMP/formal_result_gate/pull_request.json" \
            artifacts/formal_result_gate/pull_request.json
          cp "$RUNNER_TEMP/formal_result_gate/github_reviews.json" \
            artifacts/formal_result_gate/github_reviews.json

      - name: Run engineering validation
        run: |
          python -m compileall -q src scripts tests
          ruff format --check src scripts tests
          ruff check src scripts tests
          python scripts/validate_configs.py
          python scripts/validate_manifests.py
          python scripts/validate_text_contract.py
          python scripts/build_compendium.py --check

      - name: Run full profile on current pull request head
        run: |
          python scripts/run_unittest_profile.py \
            --profile full \
            --slowest-files 10 \
            --json-output artifacts/formal_result_gate/full_profile_result.json

      - name: Validate generic formal-result gate
        run: |
          python scripts/governance/validate_formal_result_gate.py \
            --submission-manifest "${{ inputs.submission_manifest_path }}" \
            --github-reviews-json artifacts/formal_result_gate/github_reviews.json \
            --full-profile-result artifacts/formal_result_gate/full_profile_result.json \
            --current-head-sha "${{ steps.pull-request.outputs.head_sha }}" \
            --pull-request-number "${{ inputs.pull_request_number }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --output artifacts/formal_result_gate/formal_result_gate_evidence.json

      - name: Upload formal-result gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-result-gate-evidence
          path: artifacts/formal_result_gate/
